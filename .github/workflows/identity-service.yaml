name: CI/CD for Identity Service

on:
  push:
    paths:
      - 'src/back-end/services/identity-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0'

    # Step 3: Restore dependencies
    - name: Restore dependencies
      run: dotnet restore src/back-end/services/identity-service/src/IdentityService.API/IdentityService.API.csproj

    # Step 4: Build the service
    - name: Build
      run: dotnet build src/back-end/services/identity-service/src/IdentityService.API/IdentityService.API.csproj --no-restore

    # Step 5: Run tests
    - name: Run tests
      run: |
        if [ -d src/back-end/services/identity-service/tests ]; then
          for testproj in src/back-end/services/identity-service/tests/*.csproj src/back-end/services/identity-service/tests/*/*.csproj; do
            if [ -f "$testproj" ]; then
              dotnet test "$testproj" --no-build
            fi
          done
        else
          echo "No tests configured for Identity Service."
        fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    # Deployment placeholder step
    - name: Deploy
      run: echo "Deploying Identity Service..."
