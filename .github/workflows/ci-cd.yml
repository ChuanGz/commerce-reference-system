name: CI/CD (Backend)

on:
  push:
    branches: [production]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/back-end/BackEnd.sln

      - name: Build
        run: dotnet build src/back-end/BackEnd.sln --no-restore

      - name: Test
        run: dotnet test src/back-end/BackEnd.sln --no-build

  docker-build-push:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    strategy:
      matrix:
        service:
          - identity-service
          - user-service
          - customer-service
          - product-service
          - inventory-service
          - order-service
          - payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
          context: src/back-end/services/${{ matrix.service }}
          file: src/back-end/services/${{ matrix.service }}/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/template-architect-${{ matrix.service }}:${{ github.sha }}

      - name: Skip Docker push (missing secrets)
        if: ${{ secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '' }}
        run: echo "Docker credentials not configured; skipping image push."

  deploy-staging:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
      - name: Deploy (placeholder)
        run: echo "Deploy step placeholder. Configure staging deployment secrets and commands."
