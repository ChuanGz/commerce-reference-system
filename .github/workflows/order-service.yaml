name: CI/CD for Order Service

on:
  push:
    paths:
      - 'src/back-end/services/order-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0'

    # Step 3: Restore dependencies
    - name: Restore dependencies
      run: |
        dotnet restore src/back-end/services/order-service/src/OrderService.API/OrderService.API.csproj
        dotnet restore src/back-end/services/order-service/tests/OrderService.UnitTests/OrderService.UnitTests.csproj
        dotnet restore src/back-end/services/order-service/tests/OrderService.IntegrationTests/OrderService.IntegrationTests.csproj

    # Step 4: Build the service
    - name: Build
      run: dotnet build src/back-end/services/order-service/src/OrderService.API/OrderService.API.csproj --no-restore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    # Deployment placeholder step
    - name: Deploy
      run: echo "Deploying Order Service..."
