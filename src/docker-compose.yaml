version: '3.8'

services:
  storefront:
    build: ./front-end/storefront
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
    networks:
      - frontend

  backoffice:
    build: ./front-end/backoffice
    ports:
      - "4200:4200"
    depends_on:
      - user-service
      - order-service
      - inventory-service
    networks:
      - frontend

  identity-service:
    build: ./back-end/services/identity-service
    ports:
      - "5001:5001"
    networks:
      - backend

  user-service:
    build: ./back-end/services/user-service
    ports:
      - "5002:5002"
    depends_on:
      - identity-service
    networks:
      - backend

  customer-service:
    build: ./back-end/services/customer-service
    ports:
      - "5003:5003"
    depends_on:
      - user-service
    networks:
      - backend

  product-service:
    build: ./back-end/services/product-service
    ports:
      - "5004:5004"
    depends_on:
      - inventory-service
    networks:
      - backend

  inventory-service:
    build: ./back-end/services/inventory-service
    ports:
      - "5005:5005"
    networks:
      - backend

  order-service:
    build: ./back-end/services/order-service
    ports:
      - "5006:5006"
    depends_on:
      - customer-service
      - product-service
    networks:
      - backend

networks:
  frontend:
  backend:
