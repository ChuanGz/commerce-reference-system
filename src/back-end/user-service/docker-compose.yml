x-environment-check:
  &required-env
  - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:?Environment not set}
  - SQL_SA_PASSWORD=${SQL_SA_PASSWORD:?Password not set}
  - ConnectionStrings__DefaultConnection=${CONNECTION_STRING:?Connection string not set}

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
    depends_on:
      - sqlserver
    networks:
      - internal

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: ${SQL_SA_PASSWORD}
      ACCEPT_EULA: "Y"
    networks:
      - internal

networks:
  internal:
    driver: bridge